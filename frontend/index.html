<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumen - AI Student Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💡 Lumen</h1>
            <p>Your AI-Powered Study Companion</p>
        </header>

        <!-- Auth Section -->
        <section id="auth-section" class="section active">
            <h2>Get Started</h2>
            <form id="signup-form">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="age">Age:</label>
                    <input type="number" id="age" min="13" max="100" required>
                </div>
                <div class="form-group">
                    <label for="grade">Grade Level:</label>
                    <select id="grade" required>
                        <option value="">Select...</option>
                        <option value="middle-school">Middle School</option>
                        <option value="high-school">High School</option>
                        <option value="college">College</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Sign Up</button>
            </form>
            <div id="signup-message"></div>
        </section>

        <!-- Dashboard Section -->
        <section id="dashboard-section" class="section">
            <div class="dashboard-header">
                <h2>Welcome, <span id="student-name">Student</span>!</h2>
                <button id="logout-btn" class="btn btn-secondary">Logout</button>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="tutoring">Tutoring</button>
                <button class="tab-btn" data-tab="assignments">Assignments</button>
                <button class="tab-btn" data-tab="progress">Progress</button>
            </div>

            <!-- Tutoring Tab -->
            <div id="tutoring" class="tab-content active">
                <h3>Get Help Understanding a Concept</h3>
                <form id="tutoring-form">
                    <div class="form-group">
                        <label for="topic">What topic do you need help with?</label>
                        <input type="text" id="topic" placeholder="e.g., Photosynthesis, Quadratic Equations" required>
                    </div>
                    <div class="form-group">
                        <label for="understanding">What do you already know about it?</label>
                        <textarea id="understanding" placeholder="Share your current understanding..." rows="4"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Ask for Help</button>
                </form>
                <div id="tutoring-response" class="response-box"></div>
            </div>

            <!-- Assignments Tab -->
            <div id="assignments" class="tab-content">
                <h3>Submit Work for Review</h3>
                <form id="assignment-form">
                    <div class="form-group">
                        <label for="assignment-name">Assignment Name:</label>
                        <input type="text" id="assignment-name" placeholder="e.g., History Essay, Math Problem Set" required>
                    </div>
                    <div class="form-group">
                        <label for="submission">Your Work:</label>
                        <textarea id="submission" placeholder="Paste your work here..." rows="6" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Get Feedback</button>
                </form>
                <div id="assignment-response" class="response-box"></div>
            </div>

            <!-- Progress Tab -->
            <div id="progress" class="tab-content">
                <h3>Your Learning Progress</h3>
                <button id="get-progress-btn" class="btn btn-primary">Load Progress Report</button>
                <div id="progress-report" class="progress-box"></div>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
